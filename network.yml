# prometheus/alerts/network.yml — Alert rules for network & security events

groups:

  - name: network
    rules:

      # High inbound traffic (potential DDoS reaching origin)
      - alert: HighInboundTraffic
        expr: rate(node_network_receive_bytes_total{device!="lo"}[5m]) > 100000000  # 100 MB/s
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High inbound traffic on {{ $labels.device }}"
          description: "{{ $value | humanize }}B/s inbound on {{ $labels.instance }}"

      # Elevated network errors
      - alert: NetworkErrors
        expr: rate(node_network_receive_errs_total[5m]) + rate(node_network_transmit_errs_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Network errors on {{ $labels.instance }}"

  - name: http
    rules:

      # High HTTP error rate
      - alert: HighErrorRate
        expr: |
          sum(rate(traefik_service_requests_total{code=~"5.."}[5m]))
          /
          sum(rate(traefik_service_requests_total[5m])) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "HTTP error rate above 5%"
          description: "Error rate: {{ $value | humanizePercentage }}"

      # High request latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(traefik_service_request_duration_seconds_bucket[5m])) by (le, service)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency > 2s for {{ $labels.service }}"

      # Rate limiting triggered (many 429s)
      - alert: RateLimitingTriggered
        expr: sum(rate(traefik_service_requests_total{code="429"}[5m])) > 20
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting is actively blocking requests"

  - name: containers
    rules:

      # Container down
      - alert: ContainerDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.job }} is down"

      # High memory usage
      - alert: ContainerHighMemory
        expr: |
          container_memory_usage_bytes{name!=""}
          / container_spec_memory_limit_bytes{name!=""} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory > 85%"

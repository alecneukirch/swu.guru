# traefik/dynamic/middlewares.yml
# Dynamic configuration — hot-reloaded without restart

http:
  middlewares:

    # -----------------------------------------------------------------------
    # Secure headers — applied to all public routes
    # -----------------------------------------------------------------------
    secure-headers:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'"
        customResponseHeaders:
          X-Powered-By: ""          # remove fingerprinting header
          Server: ""

    # -----------------------------------------------------------------------
    # Rate limiting — protect app endpoints
    # -----------------------------------------------------------------------
    rate-limit:
      rateLimit:
        average: 100               # requests per period
        period: 1m
        burst: 50

    # -----------------------------------------------------------------------
    # Strict rate limit for auth endpoints
    # -----------------------------------------------------------------------
    rate-limit-strict:
      rateLimit:
        average: 10
        period: 1m
        burst: 5

    # -----------------------------------------------------------------------
    # Basic auth — protect internal dashboards (Prometheus, Traefik)
    # Use: echo $(htpasswd -nB admin) | sed -e s/\\$/\\$\\$/g
    # -----------------------------------------------------------------------
    auth:
      basicAuth:
        usersFile: /etc/traefik/dynamic/.htpasswd
        removeHeader: true

    # -----------------------------------------------------------------------
    # IP allowlist — restrict metrics/admin endpoints to your IPs
    # -----------------------------------------------------------------------
    ip-allowlist:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "10.0.0.0/8"          # update to your VPN/office CIDR

    # -----------------------------------------------------------------------
    # Compression
    # -----------------------------------------------------------------------
    compress:
      compress: {}

    # -----------------------------------------------------------------------
    # Chain: full protection for public app routes
    # -----------------------------------------------------------------------
    public-app:
      chain:
        middlewares:
          - secure-headers
          - rate-limit
          - compress

tls:
  options:
    modern:
      minVersion: VersionTLS13
      sniStrict: true

    # Intermediate compatibility (TLS 1.2 + 1.3) for broader client support
    intermediate:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      sniStrict: true
